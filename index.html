  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Miner Pro — High Revenue</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --accent:#00e676;
  --text:#e6edf3;
  --muted:#8b98a5;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
.header{
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  color:var(--accent);
}
.balance-box{
  background:linear-gradient(135deg,#00c853,#009624);
  margin:12px;
  padding:20px;
  border-radius:16px;
  text-align:center;
  color:#000;
}
.balance-box h2{
  margin:0;
  font-size:32px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}
.btn.secondary{
  background:#1e293b;
  color:white;
}
.mine-btn{
  width:90%;
  margin:20px auto;
  display:block;
  padding:16px;
  font-size:18px;
  border-radius:50px;
  background:var(--accent);
  border:none;
}
input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  background:#0f1620;
  color:white;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f1620;
  display:flex;
}
.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--muted);
}
.nav button.active{
  color:var(--accent);
}

/* PROGRESS */
.progress-box{
  background:#0f1620;
  border-radius:10px;
  padding:6px;
  margin-top:10px;
}
.progress-bar{
  height:10px;
  background:var(--accent);
  width:0%;
  border-radius:10px;
  transition:0.3s;
}
.progress-text{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">⚡ Cloud Miner Pro</div>

<div class="balance-box">
  <div>Total Balance</div>
  <h2>$<span id="totalBalance">0.00</span></h2>
  <small>Withdraw ≥ $10</small>
</div>

<div id="homePage">

  <button class="mine-btn" id="miningBtn">⛏ Auto Mining...</button>

  <div class="grid">

    <div class="card">
      <div>Today Earnings</div>
      <h3>$<span id="todayEarnings">0.0000</span></h3>
    </div>

    <div class="card">
      <div>Gold Energy</div>
      <h3><span id="goldEnergy">20</span></h3>
    </div>

    <div class="card">
      <button class="btn secondary" id="claimGoldBtn">Claim Gold</button>
      <div id="claimTaskSection"></div>
    </div>

    <div class="card">
      <button class="btn" id="referralBtn">Referral Link</button>
    </div>

  </div>
</div>

<div id="walletPage" style="display:none;padding:12px;">
  <div class="card">
    <h3>Withdraw</h3>

    <select id="method">
      <option value="bank">Bank</option>
      <option value="ltc">Litecoin</option>
      <option value="opay">OPay</option>
      <option value="payeer">Payeer</option>
    </select>

    <input id="details" placeholder="Enter details">

    <button class="btn" id="withdrawBtn">Withdraw</button>
  </div>
</div>

<div id="infoPage" style="display:none;padding:12px;">
  <div class="card">
    <h3>How it works</h3>
    <p style="color:var(--muted)">
      Start mining, complete tasks, watch ads to earn bonuses.
    </p>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="showPage('homePage',this)">Home</button>
  <button onclick="showPage('walletPage',this)">Wallet</button>
  <button onclick="showPage('infoPage',this)">Info</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tg = window.Telegram.WebApp ?? {};
tg.expand();

window.showPage = function(page,btn){
  document.querySelectorAll('#homePage,#walletPage,#infoPage')
    .forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';

  document.querySelectorAll('.nav button')
    .forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ADSGRAM */
const RewardAd = window.Adsgram.init({ blockId: "27164" });

let totalBalance = Number(localStorage.getItem("balance")) || 0;
let todayEarnings = Number(localStorage.getItem("today")) || 0;
let energy = Number(localStorage.getItem("energy")) || 20;

function saveData(){
  localStorage.setItem("balance", totalBalance);
  localStorage.setItem("today", todayEarnings);
  localStorage.setItem("energy", energy);
}

function updateUI(){
  document.getElementById('totalBalance').textContent = totalBalance.toFixed(6);
  document.getElementById('todayEarnings').textContent = todayEarnings.toFixed(6);
  document.getElementById('goldEnergy').textContent = energy;
}

/* MINING */
setInterval(()=>{
  totalBalance += 0.000001;
  todayEarnings += 0.000001;
  updateUI();
  saveData();
},1000);

/* WATCH AD */
window.watchAdReward = function(){
  RewardAd.show().then(res=>{
    if(res.done){
      totalBalance += 0.002;
      energy += 5;
      updateUI();
      saveData();
    }
  });
}

/* BUTTONS */
document.getElementById("homePage").innerHTML += `
<div style="padding:12px;">
<button class="btn" onclick="watchAdReward()">🎥 Watch Ad & Earn</button>
<button class="btn" onclick="startWelcomeBonus()">🎁 Welcome Bonus</button>
</div>
`;

/* CLAIM TASK */
const claimTasks = ["task-27165","task-27166","task-27167"];
const taskSection = document.getElementById('claimTaskSection');

/* 🎁 WELCOME BONUS FIXED */
let welcomeStep = 0;
let taskCompleted = false;

window.startWelcomeBonus = function(){
  welcomeStep = 0;
  loadWelcomeTask();
}

function loadWelcomeTask(){

  taskCompleted = false;

  let percent = (welcomeStep / 4) * 100;

  const randomTask =
    claimTasks[Math.floor(Math.random()*claimTasks.length)];

  taskSection.innerHTML = `
  <div class="progress-box">
    <div class="progress-bar" style="width:${percent}%"></div>
  </div>
  <div class="progress-text">Task ${welcomeStep+1}/4</div>

  <adsgram-task data-block-id="${randomTask}"></adsgram-task>
  <button class="btn" id="nextTaskBtn" style="margin-top:10px; display:none;">➡ Next</button>
  `;

  const nextBtn = document.getElementById("nextTaskBtn");
  const taskEl = taskSection.querySelector('adsgram-task');

  taskEl.addEventListener('reward', () => {
    taskCompleted = true;
    nextBtn.style.display = "block";
  }, { once:true });

  nextBtn.onclick = () => {

    if(!taskCompleted){
      alert("Complete the task first!");
      return;
    }

    welcomeStep++;

    if(welcomeStep >= 4){
      energy += 40;
      saveData();
      updateUI();
      taskSection.innerHTML = "";
      alert("🎉 You're successful! You received 40 Gold Energy!");
      return;
    }

    loadWelcomeTask();
  };
}

updateUI();

});
</script>

</body>
</html>
