<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Miner Pro — High Revenue</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --accent:#00e676;
  --text:#e6edf3;
  --muted:#8b98a5;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
.header{
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  color:var(--accent);
}
.balance-box{
  background:linear-gradient(135deg,#00c853,#009624);
  margin:12px;
  padding:20px;
  border-radius:16px;
  text-align:center;
  color:#000;
}
.balance-box h2{
  margin:0;
  font-size:32px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}
.btn.secondary{
  background:#1e293b;
  color:white;
}
.mine-btn{
  width:90%;
  margin:20px auto;
  display:block;
  padding:16px;
  font-size:18px;
  border-radius:50px;
  background:var(--accent);
  border:none;
}
input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  background:#0f1620;
  color:white;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f1620;
  display:flex;
}
.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--muted);
}
.nav button.active{
  color:var(--accent);
}
</style>
</head>

<body>

<div class="header">⚡ Cloud Miner Pro</div>

<div class="balance-box">
  <div>Total Balance</div>
  <h2>$<span id="totalBalance">0.00</span></h2>
  <small>Withdraw ≥ $10</small>
</div>

<!-- HOME -->
<div id="homePage">

  <button class="mine-btn" id="miningBtn">⛏ Start Mining</button>

  <div class="grid">

    <div class="card">
      <div>Today Earnings</div>
      <h3>$<span id="todayEarnings">0.0000</span></h3>
    </div>

    <div class="card">
      <div>Gold Energy</div>
      <h3><span id="goldEnergy">20</span></h3>
    </div>

    <div class="card">
      <button class="btn secondary" id="claimGoldBtn">Claim Gold</button>
      <div id="claimTaskSection"></div>
    </div>

    <div class="card">
      <button class="btn" id="referralBtn">Referral Link</button>
    </div>

  </div>
</div>

<!-- WALLET -->
<div id="walletPage" style="display:none;padding:12px;">
  <div class="card">
    <h3>Withdraw</h3>

    <select id="method">
      <option value="bank">Bank</option>
      <option value="ltc">Litecoin</option>
      <option value="opay">OPay</option>
      <option value="payeer">Payeer</option>
    </select>

    <input id="details" placeholder="Enter details">

    <button class="btn" id="withdrawBtn">Withdraw</button>
  </div>
</div>

<!-- INFO -->
<div id="infoPage" style="display:none;padding:12px;">
  <div class="card">
    <h3>How it works</h3>
    <p style="color:var(--muted)">
      Start mining, complete tasks, watch ads to earn bonuses, and withdraw once you reach minimum balance.
    </p>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="showPage('homePage',this)">Home</button>
  <button onclick="showPage('walletPage',this)">Wallet</button>
  <button onclick="showPage('infoPage',this)">Info</button>
</div>

<script>
const tg = window.Telegram.WebApp ?? {};
tg.expand();

/* NAV */
function showPage(page,btn){
  document.querySelectorAll('#homePage,#walletPage,#infoPage')
    .forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';

  document.querySelectorAll('.nav button')
    .forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ADSGRAM */
const RewardAd = window.Adsgram.init({ blockId: "26852" });

/* DATA */
let totalBalance = Number(localStorage.getItem("balance")) || 0;
let todayEarnings = Number(localStorage.getItem("today")) || 0;
let miningRate = 0.00001;
let energy = Number(localStorage.getItem("energy")) || 20;
let vipLevel = Number(localStorage.getItem("vip")) || 0;
let lastAdTime = 0;

function saveData(){
  localStorage.setItem("balance", totalBalance);
  localStorage.setItem("today", todayEarnings);
  localStorage.setItem("energy", energy);
  localStorage.setItem("vip", vipLevel);
}

/* UI */
function updateUI(){
  document.getElementById('totalBalance').textContent = totalBalance.toFixed(6);
  document.getElementById('todayEarnings').textContent = todayEarnings.toFixed(6);
  document.getElementById('goldEnergy').textContent = energy;
}

/* ===== FIXED MINING ===== */
let miningInterval = null;
let isMining = false;

const miningBtn = document.getElementById('miningBtn');

miningBtn.onclick = () => {

  if(isMining){
    clearInterval(miningInterval);
    isMining = false;
    miningBtn.textContent = '⛏ Start Mining';
    return;
  }

  if(energy <= 0){
    alert("⚡ No energy");
    return;
  }

  isMining = true;
  miningBtn.textContent = '⛏ Mining...';

  miningInterval = setInterval(() => {

    if(energy <= 0){
      clearInterval(miningInterval);
      isMining = false;
      miningBtn.textContent = '⚡ No Energy';
      return;
    }

    energy--;

    let earn = miningRate * (10 + vipLevel * 5);

    totalBalance += earn;
    todayEarnings += earn;

    miningBtn.textContent = `⛏ +$${earn.toFixed(6)}`;

    saveData();
    updateUI();

  }, 2000);
};

/* AD REWARD */
function watchAdReward(){
  RewardAd.show().then(res=>{
    if(res.done){
      let reward = 0.002;
      totalBalance += reward;
      todayEarnings += reward;
      energy += 5;

      saveData();
      updateUI();

      alert("Earned $" + reward);
    }
  });
}

/* EXTRA BUTTONS */
document.getElementById("homePage").innerHTML += `
<div style="padding:12px;">
<button class="btn" onclick="watchAdReward()">🎥 Watch Ad & Earn</button>
</div>
`;

updateUI();

/* CLAIM TASK */
const claimBtn = document.getElementById('claimGoldBtn');
const taskSection = document.getElementById('claimTaskSection');

const claimTasks = ["task-26854","task-26855","task-26856"];
let currentClaimIndex = 0;

claimBtn.onclick = () => {
  const blockId = claimTasks[currentClaimIndex];

  taskSection.innerHTML =
    `<adsgram-task data-block-id="${blockId}"></adsgram-task>`;

  const taskEl = taskSection.querySelector('adsgram-task');

  taskEl.addEventListener('reward', () => {

    totalBalance += 0.002;
    todayEarnings += 0.002;

    saveData();
    updateUI();

    alert("Task Reward");

    currentClaimIndex =
      (currentClaimIndex + 1) % claimTasks.length;

    taskSection.innerHTML = '';
  }, { once:true });
};
</script>

</body>
</html>
