<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Miner Pro — Auto Mining</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --accent:#00e676;
  --text:#e6edf3;
  --muted:#8b98a5;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
.header{
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  color:var(--accent);
}
.balance-box{
  background:linear-gradient(135deg,#00c853,#009624);
  margin:12px;
  padding:20px;
  border-radius:16px;
  text-align:center;
  color:#000;
}
.balance-box h2{margin:0;font-size:32px;}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:bold;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f1620;
  display:flex;
}
.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--muted);
}
.nav button.active{color:var(--accent);}
</style>
</head>

<body>

<div class="header">⚡ Cloud Miner Pro</div>

<div class="balance-box">
  <div>Total Balance</div>
  <h2>$<span id="totalBalance">0.00</span></h2>
  <small>Withdraw ≥ $10</small>
</div>

<div id="homePage">

  <div class="card" style="text-align:center;margin:12px;">
    <h3 id="miningStatus">⛏ Mining Active</h3>
  </div>

  <div class="grid">

    <div class="card">
      <div>Today Earnings</div>
      <h3>$<span id="todayEarnings">0.0000</span></h3>
    </div>

    <div class="card">
      <div>Gold Energy</div>
      <h3><span id="goldEnergy">20</span></h3>
    </div>

    <div class="card">
      <button class="btn" onclick="watchAd()">🎥 Watch Ad + Energy</button>
    </div>

  </div>
</div>

<div class="nav">
  <button class="active">Home</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tg = window.Telegram.WebApp ?? {};
tg.expand();

/* DATA */
let balance = Number(localStorage.getItem("balance")) || 0;
let today = Number(localStorage.getItem("today")) || 0;
let energy = Number(localStorage.getItem("energy")) || 20;
let miningRate = 0.00002;

/* UI */
const balanceEl = document.getElementById("totalBalance");
const todayEl = document.getElementById("todayEarnings");
const energyEl = document.getElementById("goldEnergy");
const statusEl = document.getElementById("miningStatus");

function updateUI(){
  balanceEl.textContent = balance.toFixed(6);
  todayEl.textContent = today.toFixed(6);
  energyEl.textContent = energy;
}

/* SAVE */
function save(){
  localStorage.setItem("balance", balance);
  localStorage.setItem("today", today);
  localStorage.setItem("energy", energy);
}

/* AUTO MINING */
let interval = null;

function startMining(){
  if(interval) return;

  statusEl.textContent = "⛏ Mining Active";

  interval = setInterval(() => {

    if(document.hidden){
      stopMining();
      return;
    }

    if(energy <= 0){
      statusEl.textContent = "⚡ No Energy";
      return;
    }

    energy--;
    let earn = miningRate;

    balance += earn;
    today += earn;

    updateUI();
    save();

  }, 1000);
}

function stopMining(){
  clearInterval(interval);
  interval = null;
  statusEl.textContent = "⛔ Mining Paused";
}

/* STOP WHEN USER LEAVES */
document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    stopMining();
  }else{
    startMining();
  }
});

/* START ON LOAD */
startMining();

/* ADS */
window.watchAd = function(){
  const ad = window.Adsgram.init({ blockId: "26852" });

  ad.show().then(r=>{
    if(r.done){
      energy += 10;
      save();
      updateUI();
      alert("⚡ Energy +10");
    }
  });
};

updateUI();

});
</script>

</body>
</html>
